<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>E-commerce Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SECTION 1 : HERO -->
<section class="hero">
  <div class="container flex">
    <div class="left">
      <h1>Nouvelle Collection</h1>
      <p>Découvrez nos produits tendance et modernes.</p>
      <a href="#" class="btn">Acheter maintenant</a>
    </div>
    <div class="right">
      <img src="hero.webp" alt="">
    </div>
  </div>
</section>

<!-- SECTION 2 : PRODUITS -->
<section class="products">
  <div class="container">

    <h2 style="color: #ff6600; font-weight: bolder;">Nos Produits</h2>

    <div class="cards">

      <div class="card">
        <img src="chaussures.webp" alt="">
        <h3>Chaussures</h3>
      </div>

      <div class="card">
        <img src="watch.webp" alt="">
        <h3>Montres</h3>
      </div>

      <div class="card">
        <img src="sac.webp" alt="">
        <h3>Sacs</h3>
      </div>

    </div>

  </div>
</section>

<!-- SECTION 3 : CTA -->
<section class="cta">
  <div class="container flex">
    <div>
      <h2>Profitez de nos offres</h2>
      <p>Inscrivez-vous pour recevoir nos promotions.</p>
    </div>
    <a href="#" class="btn">S'inscrire</a>
  </div>
</section>

<!-- SECTION 4 : GALERIE SIMPLE -->
<section class="gallery">
  <div class="container">
    <h2>Galerie Produits</h2>

    <div class="grid-simple">
      <img src="https://images.unsplash.com/photo-1479064555552-3ef4979f8908" style="width: 500px; height: 500px;" alt="">
      <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" style="width: 400px; height: 500px;" alt="">
      <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" style="width: 400px; height: 500;" alt="">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" style="width: 400px; height: 500;" alt="">
    </div>
  </div>
</section>

<!-- SECTION 5 : GALERIE AVANCÉE -->
<section class="gallery-advanced">
  <div class="container">
    <h2>Nos Meilleures Offres</h2>

    <div class="grid-advanced">
      <img class="big" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="">
      <img src="https://images.unsplash.com/photo-1585386959984-a415522316e1" alt="">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="">
      <img src="https://images.unsplash.com/photo-1479064555552-3ef4979f8908" alt="">
    </div>
  </div>
</section>


<script>



// Message personnalisé
function showMessage() {
    alert("Le formateur a bloqué cette action");
}

// Bloquer clic droit
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
    showMessage();
});

// Bloquer touches clavier
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        showMessage();
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        showMessage();
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        showMessage();
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        showMessage();
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        showMessage();
    }
});
</script>
</body>
</html>
